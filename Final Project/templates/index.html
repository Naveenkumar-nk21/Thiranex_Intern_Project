<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Secure Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617 70%);
            color: white;
            overflow: hidden;
        }

        .background {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 10s linear infinite;
            z-index: 0;
        }

        @keyframes moveGrid {
            from { transform: translateY(0px); }
            to { transform: translateY(40px); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 380px;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(34, 211, 238, 0.35);
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.18);
            border-radius: 16px;
            padding: 28px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #67e8f9;
        }

        p.subtitle {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #e5e7eb;
            font-size: 15px;
        }

        button {
            width: 48%;
            padding: 12px;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .register-btn {
            background: #0891b2;
            color: white;
        }

        .login-btn {
            background: #22c55e;
            color: white;
        }

        .otp-box {
            margin-top: 18px;
            padding: 14px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #22d3ee;
            display: none;
        }

        .otp-code {
            font-size: 28px;
            text-align: center;
            font-weight: bold;
            color: #22d3ee;
            letter-spacing: 4px;
            margin: 10px 0;
        }

        .msg {
            text-align: center;
            margin-top: 18px;
            color: #f8fafc;
            min-height: 24px;
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <div class="card">
            <h2>Cyber Secure Login</h2>
            <p class="subtitle">Register, login, verify OTP, and access secure dashboard</p>

            <input id="user" type="text" placeholder="Username">
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">

            <div class="btn-group">
                <button class="register-btn" onclick="registerUser()">Register</button>
                <button class="login-btn" onclick="loginUser()">Login</button>
            </div>

            <div id="otpBox" class="otp-box">
                <div style="text-align:center;">Your Demo OTP</div>
                <div id="otpCode" class="otp-code">----</div>
                <input id="otpInput" type="text" placeholder="Enter OTP shown above">
                <button class="login-btn" style="width:100%;" onclick="verifyOtp()">Verify OTP</button>
            </div>

            <div id="msg" class="msg"></div>
            <div class="note">For demo purpose, OTP is displayed on the page.</div>
        </div>
    </div>

    <script>
        async function registerUser() {
            const username = document.getElementById("user").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("pass").value.trim();

            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();
            document.getElementById("msg").innerText = data.message;
        }

        async function loginUser() {
            const username = document.getElementById("user").value.trim();
            const password = document.getElementById("pass").value.trim();

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            document.getElementById("msg").innerText = data.message;

            if (data.otp) {
                document.getElementById("otpBox").style.display = "block";
                document.getElementById("otpCode").innerText = data.otp;
            } else {
                document.getElementById("otpBox").style.display = "none";
            }
        }

        async function verifyOtp() {
            const otp = document.getElementById("otpInput").value.trim();

            const res = await fetch("/verify_otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ otp })
            });

            const data = await res.json();

            if (data.message === "Login successful") {
                window.location = "/dashboard";
            } else {
                document.getElementById("msg").innerText = data.message;
            }
        }
    </script>
</body>
</html>
